  const doBlankFormSavePDF = async () => {

      showPopup({
        title: 'ยังโหลดไม่เสร็จ',
        message: 'ไลบรารีสร้าง PDF กำลังโหลด กรุณาลองใหม่อีกครั้งในอีกสักครู่',

      });
      return;
    }
    setIsGeneratingPDF(true);
    try {
      const doc = iframe.contentWindow.document;
      const pagesEls = doc.querySelectorAll('.pdf-page');
      const {
        jsPDF
      } = window.jspdf;
      const pdf = new jsPDF('p', 'mm', 'a4');
      const pw = pdf.internal.pageSize.getWidth();
      const ph = pdf.internal.pageSize.getHeight();
      for (let i = 0; i < pagesEls.length; i++) {
        if (i > 0) pdf.addPage();
        const el = pagesEls[i];
        const oShadow = el.style.boxShadow,
          oMargin = el.style.margin;
        el.style.boxShadow = 'none';
        el.style.margin = '0';
        const canvas = await window.html2canvas(el, {
          scale: 2,
          useCORS: true,
          backgroundColor: '#ffffff'
        });
        el.style.boxShadow = oShadow;
        el.style.margin = oMargin;
        const imgData = canvas.toDataURL('image/jpeg', 0.95);
        const ratio = Math.min(pw / canvas.width, ph / canvas.height);
        const w = canvas.width * ratio,
          h = canvas.height * ratio;
        pdf.addImage(imgData, 'JPEG', (pw - w) / 2, 0, w, h);
      }
      pdf.save(`แบบฟอร์มเปล่า_${blankFormPreview.type || 'IC'}.pdf`);
